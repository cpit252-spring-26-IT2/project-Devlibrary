<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account - DevLibrary</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="auth-page">
    <main class="auth-shell">
        <section class="auth-panel">
            <p class="eyebrow">DevLibrary</p>
            <h1>Create Account</h1>
            <p class="muted">Register a new account to upload and manage resources.</p>

            <form id="registerForm" class="resource-form auth-form">
                <label>
                    Username
                    <input id="registerUsername" type="text" required autocomplete="username">
                </label>
                <label>
                    Password
                    <input id="registerPassword" type="password" required autocomplete="new-password">
                </label>
                <button class="btn btn-primary" type="submit">Create Account</button>
            </form>

            <p id="authMessage" class="help-text"></p>
            <p class="auth-switch">Already have an account? <a href="/login.html">Sign in</a></p>
        </section>
    </main>
    <script src="auth.js"></script>
</body>
</html>
