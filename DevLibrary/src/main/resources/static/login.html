<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In - DevLibrary</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="auth-page">
    <main class="auth-shell">
        <section class="auth-panel">
            <p class="eyebrow">DevLibrary</p>
            <h1>Sign In</h1>
            <p class="muted">Use your DevLibrary account to continue.</p>

            <form class="resource-form auth-form" method="post" action="/login">
                <label>
                    Username
                    <input name="username" type="text" required autocomplete="username">
                </label>
                <label>
                    Password
                    <input name="password" type="password" required autocomplete="current-password">
                </label>
                <button class="btn btn-primary" type="submit">Sign In</button>
            </form>

            <p id="authMessage" class="help-text"></p>
            <p class="auth-switch">No account yet? <a href="/register.html">Create one</a></p>
        </section>
    </main>
    <script src="auth.js"></script>
</body>
</html>
